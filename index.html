<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <title>Trust Charge</title>
</head>

<body>
  <main class="app">
    <section id="homeScreen" class="screen is-active">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">Trust Charge</div>
        </div>
        <div class="date-chip" id="todayChip">May 27</div>
      </header>

      <section class="hero">
        <div class="percent-wrap">
          <svg class="progress-svg" viewBox="0 0 260 260" aria-hidden="true">
            <defs>
              <linearGradient id="movingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#f2aac8">
                  <animate attributeName="stop-color" values="#f2aac8;#a8d8ef;#c9b7ff;#f2d29b;#f2aac8" dur="6s"
                    repeatCount="indefinite" />
                </stop>
                <stop offset="45%" stop-color="#a8d8ef">
                  <animate attributeName="stop-color" values="#a8d8ef;#c9b7ff;#f2d29b;#f2aac8;#a8d8ef" dur="6s"
                    repeatCount="indefinite" />
                </stop>
                <stop offset="100%" stop-color="#c9b7ff">
                  <animate attributeName="stop-color" values="#c9b7ff;#f2d29b;#f2aac8;#a8d8ef;#c9b7ff" dur="6s"
                    repeatCount="indefinite" />
                </stop>
              </linearGradient>
            </defs>
            <circle class="progress-bg" cx="130" cy="130" r="106" />
            <circle class="progress-glow" id="progressGlow" cx="130" cy="130" r="106" />
            <circle class="progress-main" id="progressMain" cx="130" cy="130" r="106" />
          </svg>
          <div class="percent-center">
            <div class="percent-number"><span id="percentText">20</span><span>%</span></div>
          </div>
        </div>
        <!-- <p class="hero-copy">말을 아낀다. 퍼센트가 높을 수록, 말을 늘려가기<br>가벼운 말로 나를 소모하지 말자.<br>오늘 할일들을 해낼때마다<br>스스로에 대한 신뢰가 조금씩 누적.</p> -->
      </section>

      <section class="today-card">
        <div class="section-head">
          <div class="section-title-wrap">
            <h2 class="section-title">오늘의 충전</h2>
            <div class="section-sub" id="todaySub">5 항목들</div>
          </div>
          <div class="section-sub" id="todayCount">0 / 5</div>
        </div>
        <div class="task-list" id="todayTaskList"></div>
      </section>
    </section>

    <section id="calendarScreen" class="screen">
      <header class="calendar-header">
        <div class="calendar-title">
          <h1>Calendar</h1>
          <p id="periodRange">Period : 2026.05.27 — 2026.08.18</p>
        </div>
      </header>

      <nav class="month-tabs" id="monthTabs" aria-label="Select month"></nav>
      <div id="calendarWrap"></div>
      <section class="detail-panel">
        <div class="detail-date">
          <strong id="selectedDateTitle">Select date</strong>
          <span id="selectedDateMeta">Editable</span>
        </div>
        <div id="selectedTaskList" class="task-list">
          <div class="empty-note">Select an active date to edit its checklist.</div>
        </div>
      </section>
      <button class="back-btn" id="closeCalendar" aria-label="홈으로 돌아가기">확인</button>
    </section>

    <button class="fab" id="openCalendar">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="4" y="5" width="16" height="15" rx="3" stroke="currentColor" stroke-width="1.7" />
        <path d="M8 3.5V7M16 3.5V7M4.5 10H19.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
      </svg>
    </button>
  </main>

  <script>
    const START_DATE = '2026-06-01';
    const END_DATE = '2026-08-17';
    const BASE_PERCENT = 30;
    const CIRCLE_LENGTH = 666;

    // 보너스 1개 체크 시 추가되는 퍼센트
    const BONUS_POINT = 0.3;

    const EN_MONTH_NAMES = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
    const EN_WEEKDAY_NAMES = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

    const months = [
      { year: 2026, month: 5, name: 'June', fullName: 'June 2026' },
      { year: 2026, month: 6, name: 'July', fullName: 'July 2026' },
      { year: 2026, month: 7, name: 'August', fullName: 'August 2026' }
    ];

    const taskTemplates = {
      week: [
        {
          label: '러닝',
          options: ['러닝 10분', '걷기 20분', '스트레칭 10분', '회복 / 찜질']
        },
        {
          label: '영어',
          options: ['출퇴근 듣기', '쉐도잉', '오픽 스크립트', '영어회화 수업']
        },
        {
          label: '요가',
          options: ['요가 수업', '홈 요가30분', '홈 스트레칭 30분']
        },
        {
          label: '피아노',
          options: ['하농 10분', '연주곡 리스트', '레슨곡 30분', '연습실 1시간']
        },
        {
          label: '드로잉',
          options: ['20분 스케치', '사진 소묘', '아이디어 드로잉', '글쓰기+드로잉', '그림서치-10개']
        }
      ]
    };

    const bonusTemplates = {
      week: [
        {
          label: 'Add 1',
          options: ['피아노 1t', '드로잉 1t', '요가 1t', '요가 1t', '러닝 1t']
        },
        {
          label: 'Add 2',
          options: ['피아노 1t', '드로잉 1t', '요가 1t', '요가 1t', '러닝 1t']
        },
        {
          label: 'Add 3',
          options: ['피아노 1t', '드로잉 1t', '요가 1t', '요가 1t', '러닝 1t']
        }
      ]
    };
    const state = {
      selectedMonthIndex: getInitialMonthIndex(),
      selectedDate: getTodayKey(),
      records: loadRecords()
    };

    const homeScreen = document.getElementById('homeScreen');
    const calendarScreen = document.getElementById('calendarScreen');
    const progressMain = document.getElementById('progressMain');
    const progressGlow = document.getElementById('progressGlow');
    const percentText = document.getElementById('percentText');
    const todayChip = document.getElementById('todayChip');
    const todaySub = document.getElementById('todaySub');
    const todayCount = document.getElementById('todayCount');
    const todayTaskList = document.getElementById('todayTaskList');
    const monthTabs = document.getElementById('monthTabs');
    const calendarWrap = document.getElementById('calendarWrap');
    const selectedDateTitle = document.getElementById('selectedDateTitle');
    const selectedDateMeta = document.getElementById('selectedDateMeta');
    const selectedTaskList = document.getElementById('selectedTaskList');

    document.getElementById('openCalendar').addEventListener('click', () => {
      homeScreen.classList.remove('is-active');
      calendarScreen.classList.add('is-active');
      document.querySelector('.fab').style.display = 'none';
      renderMonthTabs();
      renderCalendar();
      renderSelectedDate();
    });

    document.getElementById('closeCalendar').addEventListener('click', () => {
      calendarScreen.classList.remove('is-active');
      homeScreen.classList.add('is-active');
      document.querySelector('.fab').style.display = 'flex';
      renderHome();
    });

    function getMetaKey(key) {
      return `${key}_meta`;
    }

    function getBonusMetaKey(key) {
      return `${key}_bonus_meta`;
    }

    function ensureMetaRecord(key) {
      const metaKey = getMetaKey(key);

      if (!state.records[metaKey]) {
        state.records[metaKey] = {};
      }

      return state.records[metaKey];
    }

    function ensureBonusMetaRecord(key) {
      const metaKey = getBonusMetaKey(key);

      if (!state.records[metaKey]) {
        state.records[metaKey] = {};
      }

      return state.records[metaKey];
    }
    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem('trustChargeRecords')) || {};
      } catch (error) {
        return {};
      }
    }

    function saveRecords() {
      localStorage.setItem('trustChargeRecords', JSON.stringify(state.records));
    }

    function toDate(dateString) {
      return new Date(dateString + 'T00:00:00');
    }

    function toKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatEnglishDate(key) {
      const date = toDate(key);
      const monthName = EN_MONTH_NAMES[date.getMonth()];
      return `${monthName} ${date.getDate()}`;
    }

    function formatEnglishDateWithWeekday(key) {
      const date = toDate(key);
      const weekday = EN_WEEKDAY_NAMES[date.getDay()];
      const monthName = EN_MONTH_NAMES[date.getMonth()];
      return `${weekday}, ${monthName} ${date.getDate()}`;
    }

    function formatEnglishFullDate(key) {
      const date = toDate(key);
      const monthName = EN_MONTH_NAMES[date.getMonth()];
      return `${monthName} ${date.getDate()}, ${date.getFullYear()}`;
    }

    function isWithinRange(key) {
      return key >= START_DATE && key <= END_DATE;
    }

    function getTodayKey() {
      const realToday = toKey(new Date());
      if (isWithinRange(realToday)) return realToday;
      return START_DATE;
    }

    function getInitialMonthIndex() {
      const today = toDate(getTodayKey());
      const foundIndex = months.findIndex(item => item.year === today.getFullYear() && item.month === today.getMonth());
      return foundIndex >= 0 ? foundIndex : 0;
    }

    function isPastMonth(monthItem) {
      const today = toDate(getTodayKey());
      const monthEnd = new Date(monthItem.year, monthItem.month + 1, 0);
      return monthEnd < today;
    }

    function getDayType(key) {
      const day = toDate(key).getDay();
      if (day === 6) return 'saturday';
      if (day === 5) return 'friday';
      if (day === 0) return 'sunday';
      return 'weekday';
    }

    function getTasksForDate(key) {
      return taskTemplates.week;
    }

    function getBonusForDate(key) {
      return bonusTemplates.week;
    }

    function ensureRecord(key) {
      const tasks = getTasksForDate(key);
      if (!state.records[key]) {
        state.records[key] = tasks.map(() => false);
      }
      if (state.records[key].length !== tasks.length) {
        state.records[key] = tasks.map((_, index) => Boolean(state.records[key][index]));
      }
      return state.records[key];
    }

    function ensureBonusRecord(key) {
      const bonusTasks = getBonusForDate(key);
      const bonusKey = `${key}_bonus`;

      if (!state.records[bonusKey]) {
        state.records[bonusKey] = bonusTasks.map(() => false);
      }

      if (state.records[bonusKey].length !== bonusTasks.length) {
        state.records[bonusKey] = bonusTasks.map((_, index) => Boolean(state.records[bonusKey][index]));
      }

      return state.records[bonusKey];
    }

    function getTotalTaskCount() {
      let total = 0;
      const cursor = toDate(START_DATE);
      const end = toDate(END_DATE);
      while (cursor <= end) {
        total += getTasksForDate(toKey(cursor)).length;
        cursor.setDate(cursor.getDate() + 1);
      }
      return total;
    }

    function getDoneTaskCount() {
      let done = 0;

      Object.keys(state.records).forEach(key => {
        if (!isWithinRange(key)) return;
        if (key.includes('_')) return;
        if (!Array.isArray(state.records[key])) return;

        done += state.records[key].filter(Boolean).length;
      });

      return done;
    }

    function getDoneBonusCount() {
      let done = 0;

      Object.keys(state.records).forEach(key => {
        if (!key.endsWith('_bonus')) return;
        if (!Array.isArray(state.records[key])) return;

        done += state.records[key].filter(Boolean).length;
      });

      return done;
    }
    function calculatePercent() {
      const total = getTotalTaskCount();
      const done = getDoneTaskCount();
      const bonusDone = getDoneBonusCount();

      const progressPercent = (done / total) * (100 - BASE_PERCENT);
      const bonusPercent = bonusDone * BONUS_POINT;

      return Math.min(100, Math.round((BASE_PERCENT + progressPercent + bonusPercent) * 10) / 10);
    }

    function animatePercent(nextPercent) {
      const current = Number(percentText.dataset.value || BASE_PERCENT);
      const startTime = performance.now();
      const duration = 560;

      function frame(now) {
        const progress = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        const value = current + (nextPercent - current) * eased;
        const display = Number.isInteger(value) ? value.toFixed(0) : value.toFixed(2);
        const dashOffset = CIRCLE_LENGTH - (CIRCLE_LENGTH * value / 100);

        percentText.textContent = display.replace('.0', '');
        progressMain.style.strokeDashoffset = dashOffset;
        progressGlow.style.strokeDashoffset = dashOffset;

        if (progress < 1) requestAnimationFrame(frame);
        else percentText.dataset.value = nextPercent;
      }

      requestAnimationFrame(frame);
    }

    function renderHome() {
      const todayKey = getTodayKey();
      const tasks = getTasksForDate(todayKey);
      const record = ensureRecord(todayKey);
      const done = record.filter(Boolean).length;

      const bonusTasks = getBonusForDate(todayKey);
      const bonusRecord = ensureBonusRecord(todayKey);
      const bonusDone = bonusRecord.filter(Boolean).length;

      todayChip.textContent = formatEnglishDateWithWeekday(todayKey);
      todaySub.textContent = `${tasks.length} 기본 항목 · 보너스 ${bonusTasks.length}`;
      todayCount.textContent = `${done} / ${tasks.length}`;
      todayTaskList.innerHTML = '';

      tasks.forEach((task, index) => {
        const button = document.createElement('button');
        button.className = `task ${record[index] ? 'is-checked' : ''}`;

        button.innerHTML = `
    <span class="check"></span>
    <span class="task-content">
      <span class="task-text">${task.label}</span>
      ${task.options
            ? `<select class="task-select">
              <option value="">선택</option>
              ${task.options
              .map(option => `<option value="${option}">${option}</option>`)
              .join('')}
            </select>`
            : ''
          }
    </span>
  `;

        button.addEventListener('click', () => {
          record[index] = !record[index];
          state.records[todayKey] = record;
          saveRecords();
          renderHome();
          animatePercent(calculatePercent());
        });
        const metaRecord = ensureMetaRecord(todayKey);
        const bonusMetaRecord = ensureBonusMetaRecord(todayKey);
        const select = button.querySelector('.task-select');

        if (select) {
          select.value = metaRecord[index] || '';

          ['click', 'mousedown', 'touchstart'].forEach(eventName => {
            select.addEventListener(eventName, event => {
              event.stopPropagation();
            });
          });

          select.addEventListener('change', event => {
            metaRecord[index] = event.target.value;
            state.records[getMetaKey(todayKey)] = metaRecord;
            saveRecords();
          });
        }

        todayTaskList.appendChild(button);






      });

      if (bonusTasks.length > 0) {
        const bonusTitle = document.createElement('div');
        bonusTitle.className = 'bonus-title';
        bonusTitle.textContent = `보너스 항목 ${bonusDone} / ${bonusTasks.length}`;
        todayTaskList.appendChild(bonusTitle);
      }

      bonusTasks.forEach((task, index) => {
        const button = document.createElement('button');

        button.className =
          `task bonus-task ${bonusRecord[index] ? 'is-checked' : ''}`;

        button.innerHTML = `
    <span class="check"></span>

    <span class="task-content">
      <span class="task-text">${task.label}
      </span>

      ${task.options
            ? `<select class="task-select">
              <option value="">선택</option>
              ${task.options
              .map(option =>
                `<option value="${option}">
                    ${option}
                  </option>`
              )
              .join('')}
            </select>`
            : ''
          }
    </span>
  `;

        button.addEventListener('click', () => {
          bonusRecord[index] = !bonusRecord[index];

          state.records[`${todayKey}_bonus`] =
            bonusRecord;

          saveRecords();
          renderHome();
          animatePercent(calculatePercent());
        });

        const bonusMetaRecord = ensureBonusMetaRecord(todayKey);
        const select = button.querySelector('.task-select');

        if (select) {
          select.value = bonusMetaRecord[index] || '';

          ['click', 'mousedown', 'touchstart'].forEach(eventName => {
            select.addEventListener(eventName, event => {
              event.stopPropagation();
            });
          });

          select.addEventListener('change', event => {
            bonusMetaRecord[index] = event.target.value;
            state.records[getBonusMetaKey(todayKey)] = bonusMetaRecord;
            saveRecords();
          });
        }
        todayTaskList.appendChild(button);
      });

      animatePercent(calculatePercent());
    }

    function renderMonthTabs() {
      monthTabs.innerHTML = '';

      months.forEach((monthItem, index) => {
        const button = document.createElement('button');
        button.className = 'month-tab';
        if (index === state.selectedMonthIndex) button.classList.add('is-active');
        if (isPastMonth(monthItem)) button.classList.add('is-past');
        button.textContent = monthItem.name;
        button.addEventListener('click', () => {
          state.selectedMonthIndex = index;
          const firstActiveDate = getFirstActiveDateInMonth(monthItem);
          if (firstActiveDate) state.selectedDate = firstActiveDate;
          renderMonthTabs();
          renderCalendar();
          renderSelectedDate();
        });
        monthTabs.appendChild(button);
      });
    }

    function getFirstActiveDateInMonth(monthItem) {
      const first = new Date(monthItem.year, monthItem.month, 1);
      const last = new Date(monthItem.year, monthItem.month + 1, 0);
      const cursor = new Date(first);
      while (cursor <= last) {
        const key = toKey(cursor);
        if (isWithinRange(key)) return key;
        cursor.setDate(cursor.getDate() + 1);
      }
      return null;
    }

    function renderCalendar() {
      calendarWrap.innerHTML = '';
      const monthItem = months[state.selectedMonthIndex];

      const card = document.createElement('section');
      card.className = 'month-card';
      card.innerHTML = `
        <div class="weekdays">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div class="days"></div>
      `;

      const daysWrap = card.querySelector('.days');
      const first = new Date(monthItem.year, monthItem.month, 1);
      const last = new Date(monthItem.year, monthItem.month + 1, 0);
      const firstDay = first.getDay();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'day';
        daysWrap.appendChild(empty);
      }

      for (let d = 1; d <= last.getDate(); d++) {
        const date = new Date(monthItem.year, monthItem.month, d);
        const key = toKey(date);
        const dayButton = document.createElement('button');
        const active = isWithinRange(key);
        const record = state.records[key];
        const taskCount = getTasksForDate(key).length;
        const doneCount = record ? record.filter(Boolean).length : 0;

        dayButton.className = 'day';

        const wk = date.getDay();
        if (wk === 0) dayButton.classList.add('is-sunday');
        if (wk === 6) dayButton.classList.add('is-saturday');

        if (active) dayButton.classList.add('is-active-range');
        if (key === getTodayKey()) dayButton.classList.add('is-today');
        if (key === state.selectedDate) dayButton.classList.add('is-selected');
        if (active && doneCount > 0 && doneCount < taskCount) dayButton.classList.add('has-partial');
        if (active && doneCount === taskCount) dayButton.classList.add('has-complete');

        dayButton.textContent = d;
        dayButton.disabled = !active;
        dayButton.addEventListener('click', () => {
          state.selectedDate = key;
          renderCalendar();
          renderSelectedDate();
        });
        daysWrap.appendChild(dayButton);
      }

      calendarWrap.appendChild(card);
    }

    function renderSelectedDate() {
      const key = state.selectedDate;
      if (!isWithinRange(key)) return;

      const tasks = getTasksForDate(key);
      const record = ensureRecord(key);
      const done = record.filter(Boolean).length;

      const bonusTasks = getBonusForDate(key);
      const bonusRecord = ensureBonusRecord(key);
      const bonusDone = bonusRecord.filter(Boolean).length;

      selectedDateTitle.textContent = formatEnglishDateWithWeekday(key);
      selectedDateMeta.textContent = `${done} / ${tasks.length} · 보너스 ${bonusDone} / ${bonusTasks.length}`;
      selectedTaskList.innerHTML = '';


      const metaRecord = ensureMetaRecord(key);


      tasks.forEach((task, index) => {
        const row = document.createElement('div');
        row.className = 'mini-task';
        const inputId = `task-${key}-${index}`;

        row.innerHTML = `
    <input id="${inputId}" type="checkbox" ${record[index] ? 'checked' : ''} />
    <label for="${inputId}">${task.label}</label>

    ${task.options
            ? `<select class="task-select">
            <option value="">선택</option>
            ${task.options
              .map(option => `<option value="${option}">${option}</option>`)
              .join('')}
          </select>`
            : ''
          }
  `;

        const input = row.querySelector('input');
        input.addEventListener('change', () => {
          record[index] = input.checked;
          state.records[key] = record;
          saveRecords();
          renderSelectedDate();
          renderCalendar();
          renderMonthTabs();
          animatePercent(calculatePercent());
        });

        const select = row.querySelector('.task-select');

        if (select) {
          select.value = metaRecord[index] || '';

          ['click', 'mousedown', 'touchstart'].forEach(eventName => {
            select.addEventListener(eventName, event => {
              event.stopPropagation();
            });
          });

          select.addEventListener('change', event => {
            metaRecord[index] = event.target.value;
            state.records[getMetaKey(key)] = metaRecord;
            saveRecords();
          });
        }

        selectedTaskList.appendChild(row);
      });




      if (bonusTasks.length > 0) {
        const bonusTitle = document.createElement('div');
        bonusTitle.className = 'bonus-title';
        bonusTitle.textContent = '보너스 항목';
        selectedTaskList.appendChild(bonusTitle);
      }
      const bonusMetaRecord = ensureBonusMetaRecord(key);
      bonusTasks.forEach((task, index) => {
        const row = document.createElement('div');
        row.className = 'mini-task bonus-mini-task';
        const inputId = `bonus-${key}-${index}`;

        row.innerHTML = `
    <input id="${inputId}" type="checkbox" ${bonusRecord[index] ? 'checked' : ''} />

    <label for="${inputId}">${task.label}</label>

    ${task.options
            ? `<select class="task-select">
            <option value="">선택</option>
            ${task.options
              .map(option => `<option value="${option}">${option}</option>`)
              .join('')}
          </select>`
            : ''
          }
  `;

        const input = row.querySelector('input');
        input.addEventListener('change', () => {
          bonusRecord[index] = input.checked;
          state.records[`${key}_bonus`] = bonusRecord;
          saveRecords();
          renderSelectedDate();
          renderCalendar();
          renderMonthTabs();
          animatePercent(calculatePercent());
        });

        const select = row.querySelector('.task-select');

        if (select) {
          select.value = bonusMetaRecord[index] || '';

          ['click', 'mousedown', 'touchstart'].forEach(eventName => {
            select.addEventListener(eventName, event => {
              event.stopPropagation();
            });
          });

          select.addEventListener('change', event => {
            bonusMetaRecord[index] = event.target.value;
            state.records[getBonusMetaKey(key)] = bonusMetaRecord;
            saveRecords();
          });
        }

        selectedTaskList.appendChild(row);
      });



    }

    renderHome();

    const periodEl = document.getElementById('periodRange');
    if (periodEl) {
      periodEl.textContent = `Period: ${formatEnglishFullDate(START_DATE)} — ${formatEnglishFullDate(END_DATE)}`;
    }
  </script>
</body>

</html>
